product: chummer
surface: chummer.run
version: 1
trust_pages:
  - id: help
    eyebrow: "Help"
    heading: "Get help without guessing"
    intro: "Start here for downloads, sign-in recovery, and support."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "First-party help comes first"
      - "Support is separate from participation"
      - "Downloads and setup stay clear"
    actions:
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: primary
      - label: "Open downloads"
        href: "/downloads"
        tone: secondary
      - label: "Read FAQ"
        href: "/faq"
        tone: ghost
    sections:
      - id: install-update
        eyebrow: "Install or update"
        heading: "Start with Downloads"
        body: "Downloads has Stable and Nightly installers for Windows and Linux. Use Help when install or update does not behave as expected."
        bullets:
          - "Stable is the calm default."
          - "Nightly is the newest published build."
          - "Create an account only when you want tracked support or recovery."
      - id: sign-in-recovery
        eyebrow: "Sign-in or account recovery"
        heading: "Use Account for recovery"
        body: "Sign in when you want support history, recovery, and install return tied to your account."
        bullets:
          - "Guest use is allowed."
          - "Account support keeps follow-up in one place."
          - "Recovery should stay boring."
      - id: product-bug
        eyebrow: "Product bug"
        heading: "Send bugs through Contact"
        body: "Use Contact for install trouble, product bugs, and practical feedback. Public feedback is optional."
        bullets:
          - "Use Contact for install trouble, product bugs, or UX friction."
          - "Use Account > Support if you want your support history saved in one place."
          - "Use public feedback only when the bug should stay public."
      - id: product-question
        eyebrow: "Product question or UX confusion"
        heading: "Ask Chummer first"
        body: "FAQ and Help should answer the normal questions without making you dig through project details."
        bullets:
          - "FAQ answers normal product questions in plain language."
          - "Support cases stay separate from public feedback."
          - "You do not need another account to ask for help."
  - id: privacy
    eyebrow: "Privacy"
    heading: "What Chummer stores, and what it does not"
    intro: "This is the simple privacy picture right now: what your account stores, what stays out, and how support and linked installs work."
    effective_date: "2026-03-25"
    updated_date: "2026-03-28"
    summary_points:
      - "The download file stays the same for everyone"
      - "Your account stores sign-in and support history"
      - "Raw secret keys stay out of your account record"
    actions:
      - label: "Open account"
        href: "/account"
        tone: primary
      - label: "Read terms"
        href: "/terms"
        tone: secondary
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: ghost
    sections:
      - id: hosted-account
        eyebrow: "Account record"
        heading: "Your account keeps sign-in, preferences, and support together"
        body: "Your Chummer account keeps your basic profile, linked sign-in methods, device access, support cases, and preferences together so you do not have to rebuild that history by hand."
      - id: install-linking
        eyebrow: "Install linking"
        heading: "The download file is the same for everyone"
        body: "When Chummer publishes a download, everyone gets the same file. Chummer does not build a private installer just for your account. If account linking is available, the account step is a short-lived code that reconnects a local copy back to your account."
      - id: not-in-hub
        eyebrow: "What stays out"
        heading: "Temporary sign-in tokens and raw secrets stay out of your account record"
        body: "Short-lived third-party tokens stay on the machine or service using them. Your account keeps consent, support, and access records, not raw secret keys."
      - id: recognition-privacy
        eyebrow: "Privacy and recognition"
        heading: "Recognition should not force publicity"
        body: "Participation and recognition remain optional layers. Private product use, private support, and a quiet account setup remain valid even while community pages exist."
  - id: terms
    eyebrow: "Terms"
    heading: "Terms in plain language"
    intro: "These are the plain rules for the current app: honest labels, real downloads, and straightforward support."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "Current downloads when available"
      - "Support starts with Chummer"
    actions:
      - label: "Open downloads"
        href: "/downloads"
        tone: primary
      - label: "Read privacy"
        href: "/privacy"
        tone: secondary
      - label: "Open help"
        href: "/help"
        tone: ghost
    sections:
      - id: release-labels
        eyebrow: "Release labels"
        heading: "Labels should say what you can install"
        body: "Expect current downloads and explicit labels when support, compatibility, or breadth are still moving."
      - id: account-support
        eyebrow: "Account and support"
        heading: "Sign-in is simple, and support starts with Chummer"
        body: "Sign-in keeps your access, devices, and support history together. Help and Contact are the normal first stops before any public feedback thread."
      - id: delivery
        eyebrow: "Delivery"
        heading: "Use the current public download first; advanced packages only when necessary"
        body: "Public downloads should match what is honestly available right now. If a regular installer exists later, it becomes the normal path, while manual packages stay as fallback for edge cases or support-directed setup."
  - id: contact
    eyebrow: "Contact"
    heading: "Open the right support case"
    intro: "Chummer should not make you guess where to send a problem. Start here for install help, bugs, and practical feedback."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "Direct support intake"
      - "Guest submissions allowed"
      - "Tracked follow-up with an account"
    actions:
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: primary
      - label: "Open account support"
        href: "/signup?next=%2Faccount%2Fsupport"
        tone: secondary
      - label: "Read help first"
        href: "/help"
        tone: ghost
    sections:
      - id: right-lane
        eyebrow: "Route it cleanly"
        heading: "Pick the case type that matches the problem"
        body: "Use install or update for package and launcher trouble, product bug for broken behavior, and feedback for roadmap or UX pain that is slowing the table down."
      - id: tracked-support
        eyebrow: "Tracked follow-up"
        heading: "Create an account when you want support history inside Chummer"
        body: "You can submit help here without another account. Create a Chummer account if you want to see your support history later in one place."
      - id: public-issues
        eyebrow: "Public feedback"
        heading: "Use public feedback only when the report should be public"
        body: "Most people should start with Help or Contact. Public feedback is only for technical reports you want discussed in public."
faq_pages:
  - id: faq
    eyebrow: "FAQ"
    heading: "Plain answers before you spend more time"
    intro: "The public front door should answer the normal questions directly: what to install, what an account is for, and how to get help."
    actions:
      - label: "Open downloads"
        href: "/downloads"
        tone: primary
      - label: "Open support intake"
        href: "/contact#support-intake"
        tone: secondary
      - label: "Create account"
        href: "/signup?next=/home"
        tone: ghost
    sections:
      - title: "Using Chummer"
        entries:
          - question: "Can I actually use Chummer right now?"
            answer: "Yes. There is a current public download, clear platform labels, and a direct help path when something goes wrong."
          - question: "Why would I trust what Chummer shows me?"
            answer: "Because Chummer keeps results and explanations close together in the product."
          - question: "What does account creation give me right away?"
            answer: "Account creation gives you recovery, support history in Account, and a cleaner return path when linked installs are available."
      - title: "Downloads and installs"
        entries:
          - question: "Do I need an account to download the current release?"
            answer: "No. The current Linux package is open public. Create an account when you want recovery, tracked support, and a cleaner return path when linked downloads are available."
          - question: "Does the account change the download file?"
            answer: "No. The published package stays the same for everyone. Account linking is separate from the file itself."
          - question: "Where do I go if install or update goes sideways?"
            answer: "Start with Downloads, then use Contact or Account > Support. Public issue threads are optional and not the default support door."
      - title: "Participation and support"
        entries:
          - question: "Do I need to participate to help or report a bug?"
            answer: "No. Support and feedback stand on their own. Participation is optional and separate from the normal customer help path."
          - question: "Can I get help without another account?"
            answer: "Yes. The first-party support intake is the default help path. Create a Chummer account if you want tracked support history inside your account."
