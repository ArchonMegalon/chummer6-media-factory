product: chummer
surface: chummer.run
version: 1
trust_pages:
  - id: help
    eyebrow: "Help"
    heading: "Get help without guessing"
    intro: "Pick the closest path. Keep public ideas, private bugs, and downloads separate."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "First-party help comes first"
      - "Support is separate from participation"
      - "Downloads and setup stay clear"
    actions:
      - label: "Open support"
        href: "/contact#support-intake"
        tone: primary
      - label: "Open downloads"
        href: "/downloads"
        tone: secondary
      - label: "Read FAQ"
        href: "/faq"
        tone: ghost
    sections:
      - id: install-update
        eyebrow: "Install or update"
        heading: "Downloads"
        body: "Get the current public build."
        bullets:
          - "Stable for normal use."
          - "Source build for Linux users who want to compile it themselves."
      - id: sign-in-recovery
        eyebrow: "Account recovery"
        heading: "Account"
        body: "Claim your copy only when you want recovery or linked installs."
        bullets:
          - "Guest use is fine."
          - "Claim only when you want recovery."
      - id: product-bug
        eyebrow: "Bug report"
        heading: "Private support"
        body: "Use Contact when logs, screenshots, crash details, or account details are involved."
        bullets:
          - "One issue per message."
          - "Discord is better for normal questions."
      - id: product-question
        eyebrow: "Product question"
        heading: "FAQ"
        body: "Read the short answers before opening a support case."
        bullets:
          - "No account needed."
          - "Support stays private."
  - id: privacy
    eyebrow: "Privacy"
    heading: "What Chummer stores, and what it does not"
    intro: "This is the simple privacy picture right now: what your account stores, what stays out, and how support and linked installs work."
    effective_date: "2026-03-25"
    updated_date: "2026-03-28"
    summary_points:
      - "The download file stays the same for everyone"
      - "Your account stores sign-in and help history"
      - "Raw secret keys stay out of your account record"
    actions:
      - label: "Open account"
        href: "/account"
        tone: primary
      - label: "Read terms"
        href: "/terms"
        tone: secondary
      - label: "Open support"
        href: "/contact#support-intake"
        tone: ghost
    sections:
      - id: hosted-account
        eyebrow: "Account record"
        heading: "Your account keeps sign-in, preferences, and help together"
        body: "Your Chummer account keeps your basic profile, linked sign-in methods, device access, support history, and preferences together so you do not have to rebuild that history by hand."
      - id: install-linking
        eyebrow: "Install linking"
        heading: "The download file is the same for everyone"
        body: "When Chummer publishes a download, everyone gets the same file. Chummer does not build a private installer just for your account. If account linking is available, the account step is a short-lived code that reconnects a local copy back to your account."
      - id: not-in-hub
        eyebrow: "What stays out"
        heading: "Temporary sign-in tokens and raw secrets stay out of your account record"
        body: "Short-lived third-party tokens stay on the machine or service using them. Your account keeps consent, help history, and access records, not raw secret keys."
      - id: recognition-privacy
        eyebrow: "Privacy and recognition"
        heading: "Recognition should not force publicity"
        body: "Participation and recognition remain optional layers. Private product use, private support, and a quiet account setup remain valid even while community pages exist."
  - id: terms
    eyebrow: "Terms"
    heading: "Terms in plain language"
    intro: "These are the plain rules for the current app: honest labels, real downloads, and straightforward support."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "Current downloads when available"
      - "Support starts with Chummer"
    actions:
      - label: "Open downloads"
        href: "/downloads"
        tone: primary
      - label: "Read privacy"
        href: "/privacy"
        tone: secondary
      - label: "Open help"
        href: "/help"
        tone: ghost
    sections:
      - id: release-labels
        eyebrow: "Release labels"
        heading: "Labels should say what you can install"
        body: "Expect current downloads and explicit labels when compatibility or platform breadth is still moving."
      - id: account-support
        eyebrow: "Account and help"
        heading: "Sign-in is simple, and support starts with Chummer"
        body: "Sign-in keeps your access, devices, and help history together. Help and Contact are the normal first stops before any public feedback thread."
      - id: delivery
        eyebrow: "Delivery"
        heading: "Use the current public download first; advanced packages only when necessary"
        body: "Public downloads should match what is honestly available right now. If a regular installer exists later, it becomes the normal path, while manual packages stay as fallback for edge cases or support-directed setup."
  - id: contact
    eyebrow: "Contact"
    heading: "Contact Chummer"
    intro: "For normal questions, reach me on Discord in the Chummer5 server. Use the form only for private install trouble, crashes, logs, or account detail."
    effective_date: "2026-03-25"
    updated_date: "2026-03-25"
    summary_points:
      - "Discord first"
      - "Private form for logs"
      - "Account history when needed"
    actions:
      - label: "Open Discord"
        href: "https://discord.gg/chummer"
        tone: primary
      - label: "Private support"
        href: "/contact#support-intake"
        tone: secondary
      - label: "Read help first"
        href: "/help"
        tone: ghost
    sections:
      - id: discord
        eyebrow: "Discord"
        heading: "Use the Chummer5 server for normal contact"
        body: "Questions, quick feedback, and normal discussion belong in Discord where the Chummer community already is."
      - id: tracked-support
        eyebrow: "Private"
        heading: "Use the form only when Discord is the wrong place"
        body: "Install failures, crashes, screenshots, logs, or account details should stay private. The form is for those cases."
      - id: public-issues
        eyebrow: "Public feedback"
        heading: "Use Participate for roadmap items"
        body: "Ideas and public UX feedback should go to Participate, not the private support form."
faq_pages:
  - id: faq
    eyebrow: "FAQ"
    heading: "Plain answers before you spend more time"
    intro: "The public front door should answer the normal questions directly: what to install, what an account is for, and how to get help."
    actions:
      - label: "Open downloads"
        href: "/downloads"
        tone: primary
      - label: "Open support"
        href: "/contact#support-intake"
        tone: secondary
      - label: "Claim your copy"
        href: "/signup?next=/home"
        tone: ghost
    sections:
      - title: "Using Chummer"
        entries:
          - question: "Can I actually use Chummer right now?"
            answer: "Yes. There is a current public download, clear platform labels, and a direct help path when something goes wrong."
          - question: "Why would I trust what Chummer shows me?"
            answer: "Because Chummer keeps results and explanations close together in the product."
          - question: "What does account creation give me right away?"
            answer: "Claiming your copy gives you a recovery path and linked installs when you want them."
      - title: "Downloads and installs"
        entries:
          - question: "Do I need an account to download the current release?"
            answer: "No. The current public package stays open. Claim your copy only when you want recovery or linked installs."
          - question: "Does the account change the download file?"
            answer: "No. The published package stays the same for everyone. Account linking is separate from the file itself."
          - question: "Where do I go if install or update goes sideways?"
            answer: "Start with Downloads, then use Contact or Account > Support. Public issue threads are optional and not the default help door."
      - title: "Participation and help"
        entries:
          - question: "Do I need to participate to help or report a bug?"
            answer: "No. Support and feedback stand on their own. Participation is optional and separate from the normal customer help path."
          - question: "Can I get help without another account?"
            answer: "Yes. Use Discord for normal questions and Contact for private details. Claim your copy only when recovery matters."
