    audience: public
    image_family: streetfront
    action_label: See continuity in preview
    status_note: "Continuity survives device drift without hiding the current product limits."
    pain: Carry the same dossier, ledger, and session state across devices without losing trust.
    payoff: Recorded continuity keeps the table moving even when the network does not cooperate.
