product: chummer
version: 1
purpose: Canonical public FAQ entries for the downstream Chummer6 guide.
sections:
  - id: using_chummer6
    title: Questions people actually ask first
    entries:
      - question: Can I actually use this now?
        required: true
        answer: "Yes. Chummer6 is still preview software, but the preview is real: there are live downloads, current pages, and clear labels for what is still rough."
      - question: Is it offline-safe?
        required: true
        answer: That is one of the core goals. Chummer6 is being built so bad connectivity does not destroy your flow or your work.
      - question: Why would I trust it more than old opaque tool behavior?
        required: true
        answer: Because Chummer6 tries to show why a result changed instead of leaving you with a number and no explanation.
      - question: What is preview versus available today?
        required: true
        answer: Available today means you can open it or download it right now. Preview means you can use it, but parts of the release, compatibility, or support story are still changing.
      - question: What should I show a skeptical GM or player first?
        required: true
        answer: Start with [What Chummer6 Is](WHAT_CHUMMER6_IS.md), then [Status](STATUS.md), then [Download](DOWNLOAD.md). If the real argument is about how the math is explained, show them [Core](PARTS/core.md).
  - id: participation_and_preview
    title: When something is weird or broken
    entries:
      - question: How do I report something?
        required: true
        answer: Start with Help or Contact. If you want to help test or shape a fix in public, use the participation page.
      - question: Can I help with fixes or testing?
        required: true
        answer: Yes. The participation page explains hands-on help for people who want to do more than leave feedback. It does not replace normal bug reports.
      - question: Do I need to join anything to help?
        required: true
        answer: No. Normal bug reports, documentation feedback, and feature requests still matter.
      - question: Should I use the participation page for a crash?
        required: true
        answer: No. Use the private crash or support path when logs or diagnostics are involved. Use the participation page only for safe public follow-up.
      - question: Why are some things preview-only?
        required: true
        answer: Because some parts are good enough to try before every platform, install flow, and support path is equally polished.
      - question: Will preview access open wider later?
        required: true
        answer: That is the goal. Early access may stay narrow while support cost, polish work, or approvals are still unusually high.
      - question: Can I participate privately?
        required: true
        answer: Yes. Public recognition should remain opt-in, and private participation should still be possible even when badges or leaderboards exist.
      - question: What are badges and leaderboards for?
        required: true
        answer: They are thank-yous, not power. They should celebrate useful help without replacing review or the rules themselves.
      - question: Would I need a Windows PC to join a run?
        required: true
        answer: No. The intended direction is that browsing runs, applying with a quickstart or approved runner, acknowledging table expectations, and receiving schedule and session details should work without assuming a Windows-only setup.
      - question: Is Chummer trying to replace Discord or VTTs?
        required: true
        answer: No. Chummer should handle rules, applications, scheduling records, and campaign consequences while Discord, Teams, and VTTs stay useful places to talk and play.
  - id: deeper_sources
    title: If you want more detail
    entries:
      - question: Where should I look after this?
        required: true
        answer: Start with Where To Go Deeper. It points to the optional pages without making most readers wade through planning material first.
      - question: Where does the actual code live?
        required: true
        answer: In the Chummer repositories. Most people never need them to install Chummer6, use it, or report a problem.
      - question: Where do I propose public-facing changes?
        required: true
        answer: Start with Help or Contact. Use the participation page when you want hands-on testing or focused public follow-up.
