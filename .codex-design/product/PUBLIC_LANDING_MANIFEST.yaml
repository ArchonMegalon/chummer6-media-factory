product: chummer
surface: chummer.run
version: 1
headline: Build Shadowrun characters. Know why the numbers changed.
subhead: Download Chummer, open or import a character, and keep sessions moving with
  explainable rules math, durable local state, and clear recovery paths.
proof_line: Stable and Nightly point at the current published builds with short release
  notes so you can see what is ready today.
no_provider_names: true
no_ltd_names: true
hero_ctas:
- label: Download Chummer
  href: /downloads
  emphasis: primary
- label: Open current release
  href: /now
  emphasis: secondary
guest_shell_actions:
- label: Sign in
  href: /login?next=/home
  emphasis: secondary
- label: Create account
  href: /signup?next=/home
  emphasis: primary
secondary_highlights:
- Deterministic engine
- Rules explanations
- Local-first continuity
product_proof_eyebrow: Current build
product_proof_intro: Start with the current download, then check status only when
  you need dates, platforms, or known issues.
product_proof_primary_label: Download Chummer
product_proof_primary_href: /downloads
product_proof_secondary_label: See status
product_proof_secondary_href: /status
product_proof_topline_label: Current release
product_proof_scope_line: Public pages focus on the builds, platforms, and workflows
  a player can actually try today; downloads stay the simplest way to try Chummer.
product_flagship_boundary_line: Experimental surfaces stay off the main path until
  their visuals, behavior, and tests are ready for normal users.
product_proof_result_title: Final pool 9
product_proof_result_summary: Same inputs, same answer, with a clear explanation
  attached.
product_proof_trail:
- Base 11
- Weather -1
- Wounds -1
- Recoil -1
