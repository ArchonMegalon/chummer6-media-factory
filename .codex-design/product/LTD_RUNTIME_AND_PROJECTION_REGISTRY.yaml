version: 1
key: ltd_runtime_and_projection_registry
owner: chummer6-design
status: design
purpose: >
  Capability-slot registry for owned LTDs and adjacent optional tools. The
  registry groups tools into repeatable product systems instead of one-off
  vendor integrations.
core_rule: Chummer owns truth; tools collect, administer, render, publish, schedule, archive, or amplify it.
capability_slots:
  truth_owner:
    primary: Hub
    notes: Canonical writes stay in Chummer-owned contracts and stores.
  admin_projection:
    primary: Teable
    contract: TEABLE_ADMIN_PROJECTION_AND_INTENT_LAYER.md
    boundary: projection_and_intent_only
  approval_gate:
    primary:
      - NextStep
      - ApproveThis
    boundary: process_or_external_approval_only
  intake:
    primary:
      - Deftform
      - FacePop
      - ProductLift
    boundary: receipt_mirrored_to_hub
  outbound_delivery:
    primary: Emailit
    contract: EMAILIT_OUTBOUND_DELIVERY_PROVIDER.md
    boundary: delivery_only
  passive_campaign_projection:
    primary: Signitic
    contract: SIGNITIC_FACTION_WAR_AND_WORLD_TICK_CAMPAIGNS.md
    boundary: managed_signature_cta_only
  artifact_rendering:
    primary:
      - vidBoard
      - Subscribr.ai
      - MarkupGo
      - PeekShot
      - Soundmadeseen
      - Taja
    boundary: approved_source_packet_only
  support_video_library:
    primary:
      - vidBoard
    boundary: approved_help_packet_only; pre_rendered_video_lookup; no live_user_video_generation_until_provider_api_and_privacy_proof_pass
  creator_video_preproduction:
    primary: Subscribr.ai
    vendor_plan_tier: License Tier 7 / Scale 3
    workspace_tier: Tier 4 until provider proof and source-bound roundtrip pass
    contract: SUBSCRIBR_SCRIPT_FACTORY_PROVIDER_BOUNDARY.md
    boundary: approved_source_packet_only; no repo credentials; no rules_truth; no_release_truth; no_origin_canon_truth; no_private_campaign_truth; no_direct_publish; runbook scripts, tutorial drafts, origin-dossier narration, hooks, metadata, and thumbnail briefs return to Chummer-owned review before publication
  premium_long_form_authoring:
    primary: First Book ai
    contract: ORIGIN_BOOK_STUDIO.md
    boundary: approved_packet_set_only; chapter_review_required; no_rules_truth; no_origin_canon_truth; no_publication_truth; exports return to Chummer-owned validation before release
  discovery_research:
    primary:
      - Icanpreneur
      - MetaSurvey
      - Paperguide
      - ChatPlayground AI
    boundary: product_signal_only
  automation_glue:
    primary: ApiX-Drive
    boundary: low_risk_noncritical_glue
  archive:
    primary: Internxt Cloud Storage
    boundary: cold_archive_not_hot_truth
  journey_proof:
    primary:
      - first_party_hub_events
      - Rybbit
      - PostHog_candidate
      - Sentry_candidate
    boundary: analytics_and_observability_not_user_truth; desktop shells stay opt-in and bounded to non-character metadata
product_systems:
  public_growth_system:
    tools:
      - ClickRank
      - NeuronWriter
      - Subscribr.ai
      - Rybbit
      - Katteb
      - ProductLift
      - Signitic
      - Emailit
      - Taja
      - vidBoard
    contract: PUBLIC_GROWTH_AND_VISIBILITY_STACK.md
  public_experience_qa_system:
    tools:
      - Fleet
      - Rafter
      - Pixefy
    contract: RAFTER_PIXEFY_RELEASE_QA_BOUNDARY.md
  discovery_system:
    tools:
      - ProductLift
      - Signitic
      - FacePop
      - Deftform
      - Icanpreneur
      - MetaSurvey
      - Lunacal
      - Teable
      - NextStep
      - Product Governor
      - chummer6-design
      - Emailit
    contract: KARMA_FORGE_DISCOVERY_LAB_WORKFLOWS.yaml
  artifact_factory:
    tools:
      - vidBoard
      - Subscribr.ai
      - MarkupGo
      - PeekShot
      - Taja
      - Soundmadeseen
      - Unmixr AI
      - First Book ai
    contract: ARTIFACT_FACTORY_PIPELINE_MODEL.md
  black_ledger_ops:
    tools:
      - Hub
      - Teable
      - NextStep
      - ApproveThis
      - Signitic
      - Emailit
      - MapLibre_candidate
    contract: BLACK_LEDGER_ADMIN_WORKBENCH_MODEL.md
  table_pulse_companion_lab:
    tools:
      - hedy.ai
      - Nonverbia
      - Prompt Architects
      - Unmixr AI
      - Soundmadeseen
      - first_party_consent_model
    contract: TABLE_PULSE_DEBRIEF_STUDIO_WORKFLOWS.yaml
  trust_closure_system:
    tools:
      - Hub
      - Sentry_candidate
      - ProductLift
      - Emailit
      - PayFunnels
      - PostHog_candidate
      - Fleet
      - Product Governor
    contract: PRODUCT_ANALYTICS_AND_JOURNEY_PROOF_MODEL.md
  instant_help_maintenance_system:
    tools:
      - Hub
      - Answerly
      - DocumentationAI
      - vidBoard
      - Dadan
      - Fleet
    contract: INSTANT_HELP_MAINTENANCE_MODEL.md
    boundary: maintenance_support_only; not_horizon; no_lunacal_in_normal_chummer_help; no_provider_owned_rules_or_release_truth
optional_purchase_watchlist:
  SendFox:
    fit: public_newsletter_digest_layer
    buy_posture: only_if_Emailit_stays_transactional
  CutMe Short:
    fit: branded_links_utm_expiry_campaign_analytics
    buy_posture: optional_if_campaign_links_get_messy
  Backona AI:
    fit: operator_chat_over_GA4_and_Search_Console
    buy_posture: optional_if_operators_will_not_read_dashboards
  Flonnect:
    fit: QA_bug_repro_support_evidence_tutorial_capture
    buy_posture: bounded_ops_tool_candidate
  Visby:
    fit: AI_answer_visibility_gap_monitoring
    buy_posture: optional_after_ClickRank_and_Katteb
