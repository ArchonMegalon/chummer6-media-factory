product: chummer
surface: video
version: 1
purpose: >-
  Machine-readable brief and safety contract for public, campaign, support,
  and creator-facing video artifacts rendered through Chummer-owned workflows.
global_rules:
  downstream_only: true
  canonical_truth_owner: chummer_owned_manifests_and_stores
  preview_required: true
  captions_required: true
  no_provider_names_in_output: true
  no_vendor_watermarks_on_promoted_assets: true
  localized_review_required: true
  exact_trust_text_must_be_reviewed: true
  approval_before_publication: true
  allowed_avatar_postures:
    - branded_presenter
    - neutral_presenter
    - faceless
  forbidden_postures:
    - fake_player_or_gm_without_explicit_consent
    - live_surveillance_companion
    - player_scoring_video
    - moderation_truth_video
  shipping_locales:
    - en-US
    - de-DE
    - fr-FR
    - ja-JP
    - pt-BR
    - zh-CN
video_families:
  - id: horizon_explainer_reel
    audience: public
    duration_seconds_target: 90
    duration_seconds_max: 120
    preferred_lane: MagicFit candidate or media-factory successor lane
    avatar_posture: faceless
    sibling_artifacts:
      - horizon_doc
      - public_horizon_card
      - caption_file
      - media_manifest_entry
    approval_level: public_horizon_explainer
    source_modes:
      - approved_horizon_doc
      - approved_public_guide_copy
      - generated_reel_manifest_with_audio_probe
    forbidden_modes:
      - future_direction_as_current_shipment
      - provider_output_as_product_truth
      - official_sourcebook_art_or_logos
      - uncaptioned_public_video
    claim_truth_order:
      - horizon_doc
      - public_guide_copy
      - media_manifest_entry
      - rendered_video
    required_receipt_fields:
      - horizon_id
      - public_mp4
      - public_captions
      - has_video
      - has_audio
  - id: public_release_explainer
    audience: public
    duration_seconds_target: 60
    duration_seconds_max: 120
    preferred_lane: vidBoard
    avatar_posture: branded_presenter
    sibling_artifacts:
      - release_notes_page
      - release_preview_card
    approval_level: public_release
    source_modes:
      - approved_release_summary
      - registry_backed_release_metadata
    forbidden_modes:
      - raw_provider_generated_facts
      - unpublished_fix_claims
  - id: support_closure_video
    audience: signed_in_user
    duration_seconds_target: 45
    duration_seconds_max: 90
    preferred_lane: vidBoard
    avatar_posture: neutral_presenter
    sibling_artifacts:
      - support_case_update
      - help_article_or_fix_note
    approval_level: support_resolution
    source_modes:
      - approved_support_resolution_summary
      - release_channel_confirmation
    forbidden_modes:
      - fixed_before_release_reached_channel
      - unsupported_workaround_claims
  - id: build_explain_companion_video
    audience: signed_in_user
    audience_variants:
      - compare_review
      - import_followthrough
      - blocker_followthrough
    duration_seconds_target: 45
    duration_seconds_max: 120
    preferred_lane: vidBoard
    avatar_posture: faceless
    locale_fallback_chain:
      - requested_locale
      - packet_default_locale
      - en-US
    launch_surfaces:
      - build_lab_compare
      - import_receipt_panel
      - blocker_panel
      - desktop_explain_companion
    sibling_artifacts:
      - approved_explain_packet
      - receipt_anchor_sheet
      - preview_card
      - localized_text_fallback
    required_receipt_fields:
      - packet_revision_id
      - rule_environment_digest
      - anchor_scope_ids
      - approval_record_scope
    approval_level: build_explain_publication
    claim_truth_order:
      - inspectable_engine_packet
      - receipt_anchor_scope
      - approval_record
      - rendered_companion
    approval_scope_axes:
      - artifact_family
      - packet_revision
      - locale
      - audience_posture
    source_modes:
      - approved_build_lab_explain_packet
      - approved_import_receipt_summary
      - approved_blocker_receipt_summary
    forbidden_modes:
      - unanchored_summary_claims
      - legality_without_receipt_anchor
      - recommendation_without_packet_scope
      - approval_without_exact_packet_revision
      - revision_or_rule_environment_mismatch
    fallback_when_unverified:
      - approved_explain_packet
      - receipt_anchor_sheet
      - localized_text_fallback
  - id: campaign_primer_video
    audience: player_or_gm
    audience_variants:
      - campaign_joiner
      - player_safe
      - gm_safe
    spoiler_class: primer_safe
    duration_seconds_target: 90
    duration_seconds_max: 180
    preferred_lane: vidBoard
    avatar_posture: neutral_presenter
    locale_fallback_chain:
      - requested_locale
      - campaign_default_locale
      - en-US
    launch_surfaces:
      - campaign_home
      - claimed_desktop
      - mobile_campaign_home
    sibling_artifacts:
      - campaign_primer_packet
      - preview_card
      - localized_text_fallback
    approval_level: campaign_publish
    source_modes:
      - approved_campaign_primer_pack
      - approved_campaign_summary
  - id: mission_brief_video
    audience: player_or_gm
    audience_variants:
      - player_safe
      - observer_safe
      - gm_only
    spoiler_class: player_safe_by_default
    duration_seconds_target: 60
    duration_seconds_max: 120
    preferred_lane: vidBoard
    avatar_posture: neutral_presenter
    locale_fallback_chain:
      - requested_locale
      - campaign_default_locale
      - en-US
    launch_surfaces:
      - campaign_home
      - claimed_desktop
      - mobile_campaign_home
    sibling_artifacts:
      - mission_packet
      - preview_card
      - localized_text_fallback
    approval_level: campaign_publish
    source_modes:
      - approved_mission_brief_packet
      - approved_run_summary
    forbidden_modes:
      - hidden_spoilers_not_marked_for_audience
      - gm_only_material_on_player_safe_surface
  - id: runsite_orientation_video
    audience: player_or_gm
    audience_variants:
      - player_safe_orientation
      - gm_route_review
    duration_seconds_target: 45
    duration_seconds_max: 90
    preferred_lane: vidBoard
    avatar_posture: faceless
    locale_fallback_chain:
      - requested_locale
      - runsite_pack_default_locale
      - en-US
    launch_surfaces:
      - runsite_page
      - campaign_home
      - mobile_campaign_home
    sibling_artifacts:
      - runsite_pack
      - route_preview
      - runsite_tour
    approval_level: campaign_publish
    source_modes:
      - approved_runsite_pack
      - approved_route_summary
    claim_truth_order:
      - approved_runsite_pack
      - approved_route_summary
      - inspectable_route_or_tour_sibling
      - rendered_orientation_clip
    required_receipt_fields:
      - runsite_pack_id
      - route_summary_id
      - inspectable_route_ref
      - inspectable_pack_ref
    fallback_when_unverified:
      - runsite_route_overlay
      - runsite_tour
      - approved_runsite_pack
    forbidden_modes:
      - clip_as_only_route_surface
      - tactical_callouts_without_anchor
      - host_claims_live_state
      - route_or_tour_hidden
  - id: creator_promo_video
    audience: public_or_creator_followers
    duration_seconds_target: 45
    duration_seconds_max: 90
    preferred_lane: vidBoard
    avatar_posture: branded_presenter
    sibling_artifacts:
      - preview_card
      - artifact_page
    approval_level: publication
    source_modes:
      - approved_artifact_manifest
      - approved_promo_script
  - id: player_safe_recap_video
    audience: campaign_members
    duration_seconds_target: 60
    duration_seconds_max: 120
    preferred_lane: vidBoard
    avatar_posture: faceless
    sibling_artifacts:
      - player_safe_recap_packet
      - preview_card
    approval_level: campaign_private
    source_modes:
      - approved_player_safe_recap_script
      - approved_structural_digest
    forbidden_modes:
      - blame_language
      - player_ranking
      - moderation_claims
      - live_session_stream
  - id: gm_private_debrief_video
    audience: gm_only
    duration_seconds_target: 90
    duration_seconds_max: 180
    preferred_lane: vidBoard
    avatar_posture: faceless
    sibling_artifacts:
      - gm_debrief_packet
    approval_level: private_operator_or_gm
    source_modes:
      - approved_gm_debrief_script
      - approved_coaching_packet
planned_horizon_reels:
  - id: origin_dossier_90s_deepdive
    horizon_id: origin-dossier
    family: horizon_explainer_reel
    status: magicfit_proof_clip_rendered_full_reel_credit_blocked
    source_doc: products/chummer/horizons/origin-dossier.md
    output_target: /media/horizons/origin-dossier-90s-deepdive.mp4
    captions_target: /media/horizons/origin-dossier-90s-deepdive.vtt
    proof_clip:
      source_receipt: /docker/chummercomplete/_completion/origin_dossier_horizon_20260618/magicfit_clips_api/origin_dossier_90s_deepdive/origin_dossier_01_sheet_without_soul_4s.magicfit.json
      local_mp4: /docker/chummercomplete/_completion/origin_dossier_horizon_20260618/magicfit_clips_api/origin_dossier_90s_deepdive/origin_dossier_01_sheet_without_soul_4s.mp4
      duration_seconds: 4.096
      has_audio: true
      public_link_allowed: false
      reason: Short provider proof clip only; the full horizon reel still needs enough MagicFit credits for the remaining scenes.
    blockers:
      - full_90s_reel_needs_magicfit_video_credits
      - public_link_waits_for_full_reel_audio_probe_and_human_review
    approval_posture: proof_clip_verified_public_horizon_explainer_not_yet_publishable
    creative_contract:
      style: grounded live-action product documentary with restrained cyberpunk table detail
      avoid:
        - prompt-looking generated text
        - official Shadowrun logos or sourcebook layouts
        - autonomous AI authority framing
        - media provider as character truth
        - sheet mechanics silently changing
      must_show:
        - player review and approval
        - GM steer as advisory context
        - origin canon feeding later ALICE follow-up
        - dossier media as downstream artifact
        - optional audiobook as a scoped player handoff
        - Chummer-owned rules truth boundary
    scenes:
      - scene_id: origin_dossier_01_sheet_without_soul
        duration_seconds: 9
        on_screen_text: ORIGIN DOSSIER
        narration: "A runner can be legal and still feel unfinished. Origin Dossier starts where the numbers need a person behind them."
        visual: "A player studies a clean but impersonal character sheet beside dice, notes, and an empty portrait frame."
      - scene_id: origin_dossier_02_gm_steer
        duration_seconds: 9
        on_screen_text: GM steer stays visible
        narration: "The GM can add the campaign pressure: clinic debt, restricted ware, hard requirements, and the reason this story belongs at this table."
        visual: "The GM writes bounded constraints on a tablet while the player watches, with practical AR tags hovering near the physical notes."
      - scene_id: origin_dossier_03_draft_origin
        duration_seconds: 9
        on_screen_text: Draft origin
        narration: "Chummer turns the build and the steer into a grounded origin draft, not a hidden rule change."
        visual: "Draft pages, portrait thumbnails, and a city-scene board assemble around the runner concept without readable generated UI text."
      - scene_id: origin_dossier_04_approval
        duration_seconds: 9
        on_screen_text: Player and GM approve
        narration: "The player and GM approve canon before it becomes part of the dossier. Review is the feature."
        visual: "Two hands confirm a reviewed dossier packet on a shared table, with sparse approval indicators added in post."
      - scene_id: origin_dossier_05_bundle_root
        duration_seconds: 9
        on_screen_text: Dossier bundle
        narration: "The approved origin becomes a bundle root: canon, PDF, portraits, scenes, narration, audiobook, storyboard, and render requests."
        visual: "Physical folders, portrait contact sheets, and a small audio waveform card spread across the table like a professional case file."
      - scene_id: origin_dossier_06_media_downstream
        duration_seconds: 9
        on_screen_text: Media is downstream
        narration: "Portraits, scenes, and video make the runner easier to remember. They do not become character authority."
        visual: "A portrait candidate and scene still are reviewed with reject and select gestures; the sheet remains untouched nearby."
      - scene_id: origin_dossier_07_alice_reads_context
        duration_seconds: 9
        on_screen_text: ALICE reads approved canon
        narration: "Later, ALICE can use the approved origin, and open the player's audiobook, without pretending story prose outranks mechanics."
        visual: "ALICE-style coaching context appears beside a runner dossier, a scoped audiobook chip, and a separate mechanics receipt card."
      - scene_id: origin_dossier_08_boundary
        duration_seconds: 9
        on_screen_text: No silent mechanics
        narration: "The clinic favor can explain a debt. It cannot auto-apply ware, nuyen, qualities, magic, or legality."
        visual: "A sheet edit stays locked until a deliberate player action, while the origin note remains clearly separate."
      - scene_id: origin_dossier_09_table_memory
        duration_seconds: 9
        on_screen_text: The table remembers
        narration: "The runner now has history, obligations, and a clean handoff into campaign memory."
        visual: "The player places the approved dossier beside a campaign map as the GM points toward the next run."
      - scene_id: origin_dossier_10_close
        duration_seconds: 9
        on_screen_text: A person, not just a build
        narration: "Origin Dossier gives Chummer a way to make characters feel human while the rules engine stays honest."
        visual: "Final hero shot of the runner portrait, dice, approved packet, and table crew in warm practical light."
render_companions:
  preview_lane: PeekShot
  document_lane: MarkupGo
  narration_lane: Soundmadeseen
  motion_support_lane: Mootion
  route_support_lane: AvoMap
  explorable_support_lane: Crezlo_Tours
  transcript_structure_lane: hedy.ai
  coaching_lane: Nonverbia
  candidate_dubbing_lane: Unmixr_AI
